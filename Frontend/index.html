<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippmix AI Pro - Top Ligák</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --success: #34a853;
            --dark: #202124;
            --light-bg: #f8f9fa;
            --border: #dadce0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--light-bg); margin: 0; display: flex; justify-content: center; color: var(--dark); }
        .container { width: 100%; max-width: 900px; background: white; min-height: 100vh; box-shadow: var(--shadow); padding-bottom: 50px; }
        header { background: var(--dark); color: white; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--primary); }
        header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        header p { margin: 10px 0 0; opacity: 0.8; font-size: 14px; }
        .content { padding: 20px; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: all 0.3s; box-shadow: 0 4px 6px rgba(26, 115, 232, 0.2); margin-bottom: 25px; }
        .main-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(26, 115, 232, 0.3); }

        .liga-fejlec { background: #f1f3f4; color: var(--dark); padding: 15px 20px; margin-top: 15px; cursor: pointer; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); font-weight: bold; }
        .liga-tartalom { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 5px; background: #fff; }

        .meccs-kartya { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .meccs-kartya:last-child { border-bottom: none; }
        .meccs-idopont { color: #1a73e8; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .meccs-nevek { font-size: 17px; font-weight: bold; margin-bottom: 12px; }

        .analyze-btn { background: white; color: var(--success); border: 2px solid var(--success); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .analyze-btn:hover { background: var(--success); color: white; }

        .reszletek { width: 100%; margin-top: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .prediction-box { grid-column: span 2; background: #e8f0fe; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #c2e7ff; font-weight: bold; }

        .matrix-container { overflow-x: auto; margin-top: 15px; }
        .matrix-table { margin: 5px auto; border-collapse: collapse; font-size: 12px; width: 100%; }
        .matrix-table td, .matrix-table th { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .matrix-table th { background: #eee; }
        .high-prob { background: #34a853 !important; color: white !important; font-weight: bold; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ Tippmix AI Pro</h1>
            <p>Top 10 Liga + UEFA Kupák | Poisson Elemzés</p>
        </header>

        <div class="content">
            <button class="main-btn" onclick="betoltes()">TOP LIGÁK FRISSÍTÉSE</button>
            <div id="status" style="text-align:center; color:#5f6368; margin-bottom:15px;"></div>
            <div id="lista"></div>
        </div>
    </div>

    <script>
    // FONTOS: Ez legyen a te Renderes címed!
    const apiUrl = "https://mixseged-backend.onrender.com"; 

    function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
    function poisson(lambda, k) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

    async function betoltes() {
        const lista = document.getElementById("lista");
        const status = document.getElementById("status");
        status.innerHTML = '<div class="loader"></div>';
        lista.innerHTML = "";

        try {
            const res = await fetch(`${apiUrl}/api/meccsek`);
            const adat = await res.json();
            
            if (!adat || adat.length === 0) {
                status.innerText = "Nincs elérhető meccs a várt ligákban.";
                return;
            }

            // Csoportosítás ligák szerint
            const csoportok = {};
            adat.forEach(m => {
                const ligaNev = m.sport_title || "Egyéb Liga";
                if (!csoportok[ligaNev]) csoportok[ligaNev] = [];
                csoportok[ligaNev].push(m);
            });

            for (const liga in csoportok) {
                const ligaWrapper = document.createElement("div");
                
                const fej = document.createElement("div");
                fej.className = "liga-fejlec";
                fej.innerHTML = `<span>🏆 ${liga}</span> <span class="icon">▼</span>`;
                
                const tart = document.createElement("div");
                tart.className = "liga-tartalom";

                csoportok[liga].forEach(m => {
                    let odds1 = "-", oddsX = "-", odds2 = "-";
                    if(m.bookmakers && m.bookmakers.length > 0) {
                        const market = m.bookmakers[0].markets.find(x => x.key === 'h2h');
                        if(market) {
                            const h = market.outcomes.find(o => o.name === m.home_team);
                            const a = market.outcomes.find(o => o.name === m.away_team);
                            const d = market.outcomes.find(o => o.name === 'Draw');
                            if(h) odds1 = h.price;
                            if(a) odds2 = a.price;
                            if(d) oddsX = d.price;
                        }
                    }

                    const meccsIdo = new Date(m.commence_time).toLocaleString('hu-HU', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });

                    const div = document.createElement("div");
                    div.className = "meccs-kartya";
                    div.innerHTML = `
                        <div class="meccs-idopont">📅 ${meccsIdo}</div>
                        <div class="meccs-nevek">${m.home_team} - ${m.away_team}</div>
                        <button class="analyze-btn" onclick="elemzes(this, '${m.home_team}', '${m.away_team}', '${odds1}', '${oddsX}', '${odds2}')">AI ELEMZÉS</button>
                        <div class="reszletek"></div>
                    `;
                    tart.appendChild(div);
                });

                fej.onclick = () => {
                    const vis = tart.style.display === "block";
                    tart.style.display = vis ? "none" : "block";
                    fej.querySelector(".icon").innerText = vis ? "▼" : "▲";
                };

                ligaWrapper.appendChild(fej);
                ligaWrapper.appendChild(tart);
                lista.appendChild(ligaWrapper);
            }
            status.innerText = "Sikeres betöltés!";
        } catch (e) { 
            status.innerText = "Hiba a kapcsolódáskor."; 
        }
    }

    function elemzes(gomb, hNev, vNev, odds1, oddsX, odds2) {
        const reszletek = gomb.nextElementSibling;
        if(odds1 === "-") { reszletek.innerHTML = "Nincs odds."; return; }

        const margin = (1 / odds1) + (1 / oddsX) + (1 / odds2);
        const p1 = (1 / odds1) / margin;
        const p2 = (1 / odds2) / margin;

        let totalGoals = 2.65;
        let supremacy = (p1 - p2) * 2.1;
        let hExp = (totalGoals + supremacy) / 2;
        let vExp = (totalGoals - supremacy) / 2;
        if (hExp < 0.2) hExp = 0.2; if (vExp < 0.2) vExp = 0.2;

        let matrixHtml = `<div class="matrix-container"><table class="matrix-table"><tr><th>Gól</th>`;
        for(let i=0; i<=3; i++) matrixHtml += `<th>H ${i}</th>`;
        matrixHtml += "</tr>";

        let maxP = 0; let bestS = "0-0";
        for(let v=0; v<=3; v++) {
            matrixHtml += `<tr><th>V ${v}</th>`;
            for(let h=0; h<=3; h++) {
                const p = (poisson(hExp, h) * poisson(vExp, v) * 100).toFixed(1);
                if(parseFloat(p) > maxP) { maxP = p; bestS = `${h} - ${v}`; }
                let cls = p > 12 ? 'high-prob' : '';
                matrixHtml += `<td class="${cls}">${p}%</td>`;
            }
            matrixHtml += "</tr>";
        }
        matrixHtml += "</table></div>";

        reszletek.innerHTML = `
            <div class="stat-grid">
                <div style="text-align:center">🏠 ${hExp.toFixed(1)} xG</div>
                <div style="text-align:center">🚀 ${vExp.toFixed(1)} xG</div>
                <div class="prediction-box">Tipp: ${bestS} (${maxP}%)</div>
            </div>
            ${matrixHtml}
        `;
        gomb.style.display = 'none';
    }
    </script>
</body>
</html>
