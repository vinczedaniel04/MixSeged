<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippmix AI Pro - Statisztikai Labor</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            color: var(--text);
            line-height: 1.5;
        }

        .container { 
            width: 100%; 
            max-width: 900px; 
            background: var(--panel); 
            min-height: 100vh;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: 2px; color: white; }
        header p { margin: 10px 0 0; color: var(--primary); font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }

        .content { padding: 25px; }

        .main-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 1.1em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
        }

        .main-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4); }

        .liga-fejlec { 
            background: #334155; 
            padding: 18px 25px; 
            margin-top: 20px; 
            cursor: pointer; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid var(--border);
            font-weight: 700;
            transition: 0.2s;
        }
        .liga-fejlec:hover { border-color: var(--primary); }

        .liga-tartalom { display: none; background: #0f172a; border-radius: 0 0 12px 12px; padding: 10px; border: 1px solid var(--border); border-top: none; }

        .meccs-kartya { 
            padding: 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .meccs-kartya:last-child { border-bottom: none; }

        .status-badge { font-size: 11px; font-weight: 900; padding: 5px 12px; border-radius: 30px; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .status-future { background: rgba(59, 130, 246, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .status-live { background: var(--danger); color: white; animation: pulse 2s infinite; border: 1px solid var(--danger); }
        .status-finished { background: #1e293b; color: #94a3b8; border: 1px solid var(--border); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .meccs-nevek { font-size: 22px; font-weight: 900; margin-bottom: 20px; text-align: center; letter-spacing: -0.5px; color: white; }

        .analyze-btn { 
            background: #0f172a; 
            color: var(--success); 
            border: 2px solid var(--success); 
            padding: 10px 35px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        .analyze-btn:hover { background: var(--success); color: white; }

        .reszletek { width: 100%; margin-top: 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .xg-box { background: #334155; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .xg-value { font-size: 24px; font-weight: 900; display: block; color: var(--primary); }

        .prediction-main { 
            grid-column: span 2; 
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .prediction-main span { font-size: 13px; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
        .prediction-main b { font-size: 32px; display: block; margin: 5px 0; color: white; }

        .extra-stats { 
            grid-column: span 2; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .stat-pill { background: #0f172a; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); font-size: 14px; }
        .stat-pill b { color: var(--warning); font-size: 16px; }

        .matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; background: #0f172a; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .matrix-table th { background: #1e293b; color: #94a3b8; padding: 12px; font-weight: 800; }
        .matrix-table td { border: 1px solid var(--border); padding: 12px; text-align: center; color: #64748b; }
        
        .high-prob { background: rgba(34, 197, 94, 0.1); color: var(--success); font-weight: bold; }
        .top-prob { background: var(--danger) !important; color: white !important; font-weight: 900; }

        .loader { border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ TIPPMIX AI LABOR</h1>
            <p>Advanced Poisson Analytics & 24H Live Tracking</p>
        </header>

        <div class="content">
            <button class="main-btn" onclick="betoltes()">MAI ANALÍZIS INDÍTÁSA</button>
            <div id="status" style="text-align:center; color:#94a3b8; font-weight: 600; margin-bottom:15px;"></div>
            <div id="lista"></div>
        </div>
    </div>

    <script>
    const apiUrl = "https://mixseged-backend.onrender.com"; 

    function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
    function poisson(lambda, k) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

    async function betoltes() {
        const lista = document.getElementById("lista");
        const status = document.getElementById("status");
        status.innerHTML = '<div class="loader"></div>';
        lista.innerHTML = "";

        try {
            // Cache-törlés időbélyeggel
            const res = await fetch(`${apiUrl}/api/meccsek?v=${Date.now()}`);
            const adat = await res.json();
            
            if (!adat || adat.length === 0) {
                status.innerText = "Nincs aktuális adat az irodáktól.";
                return;
            }

            // SZŰRÉS: Ma és Holnap (24 órás ablak)
            const ma = new Date();
            const holnap = new Date();
            holnap.setDate(ma.getDate() + 1);

            const megjelenitendoMeccsek = adat.filter(m => {
                const meccsIdo = new Date(m.commence_time);
                return (meccsIdo.getDate() === ma.getDate() || meccsIdo.getDate() === holnap.getDate()) &&
                       meccsIdo.getMonth() === ma.getMonth();
            });

            if (megjelenitendoMeccsek.length === 0) {
                status.innerText = "A következő 24 órában nincs több mérkőzés a listában.";
                return;
            }

            const csoportok = {};
            megjelenitendoMeccsek.forEach(m => {
                const liga = m.sport_title || "Egyéb";
                if (!csoportok[liga]) csoportok[liga] = [];
                csoportok[liga].push(m);
            });

            for (const liga in csoportok) {
                const ligaWrapper = document.createElement("div");
                const fej = document.createElement("div");
                fej.className = "liga-fejlec";
                fej.innerHTML = `<span>🏆 ${liga}</span> <span>▼</span>`;
                
                const tart = document.createElement("div");
                tart.className = "liga-tartalom";

                csoportok[liga].forEach(m => {
                    let o1 = "-", oX = "-", o2 = "-";
                    if(m.bookmakers && m.bookmakers[0]) {
                        const mkt = m.bookmakers[0].markets.find(x => x.key === 'h2h');
                        if(mkt) {
                            o1 = mkt.outcomes.find(o => o.name === m.home_team)?.price || 1;
                            o2 = mkt.outcomes.find(o => o.name === m.away_team)?.price || 1;
                            oX = mkt.outcomes.find(o => o.name === 'Draw')?.price || 1;
                        }
                    }

                    const kezd = new Date(m.commence_time);
                    const diff = (new Date() - kezd) / (1000 * 60);
                    let stCls = "status-future", stTxt = "🕒 " + kezd.toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit'});

                    if (diff > 0 && diff < 115) { stCls = "status-live"; stTxt = "🔴 ÉLŐ / FOLYAMATBAN"; }
                    else if (diff >= 115) { stCls = "status-finished"; stTxt = "🏁 VÉGE"; }

                    const div = document.createElement("div");
                    div.className = "meccs-kartya";
                    div.innerHTML = `
                        <div class="status-badge ${stCls}">${stTxt}</div>
                        <div class="meccs-nevek">${m.home_team} - ${m.away_team}</div>
                        <button class="analyze-btn" onclick="elemzes(this, '${m.home_team}', '${m.away_team}', ${o1}, ${oX}, ${o2})">Analízis</button>
                        <div class="reszletek"></div>
                    `;
                    tart.appendChild(div);
                });

                fej.onclick = () => { tart.style.display = tart.style.display === "block" ? "none" : "block"; };
                ligaWrapper.appendChild(fej);
                ligaWrapper.appendChild(tart);
                lista.appendChild(ligaWrapper);
            }
            status.innerText = "RENDSZER ONLINE - 24H KÍNÁLAT BETÖLTVE";
        } catch (e) { status.innerText = "Szerver hiba!"; }
    }

    function elemzes(gomb, hNev, vNev, o1, oX, o2) {
        const reszletek = gomb.nextElementSibling;
        const margin = (1/o1) + (1/oX) + (1/o2);
        const p1 = (1/o1)/margin, p2 = (1/o2)/margin;

        let baseGoals = 2.75;
        let hExp = baseGoals * p1 * 1.3; // Enyhén felerősített támadó érték
        let vExp = baseGoals * p2 * 1.3;

        let maxP = 0, bestS = "0-0", results = [];
        let over25 = 0, bts = 0;

        for(let v=0; v<=4; v++) {
            for(let h=0; h<=4; h++) {
                const p = parseFloat((poisson(hExp, h) * poisson(vExp, v) * 100).toFixed(1));
                results.push({h, v, p});
                if(p > maxP) { maxP = p; bestS = `${h} - ${v}`; }
                if((h+v) > 2.5) over25 += p;
                if(h > 0 && v > 0) bts += p;
            }
        }

        let matrixHtml = `<table class="matrix-table"><tr><th>Gól</th>`;
        for(let i=0; i<=3; i++) matrixHtml += `<th>H ${i}</th>`;
        matrixHtml += "</tr>";

        for(let v=0; v<=3; v++) {
            matrixHtml += `<tr><th>V ${v}</th>`;
            for(let h=0; h<=3; h++) {
                const cur = results.find(x => x.h === h && x.v === v).p;
                let cls = cur === maxP ? 'top-prob' : (cur > 10 ? 'high-prob' : '');
                matrixHtml += `<td class="${cls}">${cur}%</td>`;
            }
            matrixHtml += "</tr>";
        }
        matrixHtml += "</table>";

        reszletek.innerHTML = `
            <div class="stat-grid">
                <div class="xg-box"><span>HAZAI xG</span><b class="xg-value">${hExp.toFixed(2)}</b></div>
                <div class="xg-box"><span>VENDÉG xG</span><b class="xg-value">${vExp.toFixed(2)}</b></div>
                
                <div class="prediction-main">
                    <span>AI TIPP</span>
                    <b>${bestS}</b>
                    <span>Valószínűség: ${maxP}%</span>
                </div>

                <div class="extra-stats">
                    <div class="stat-pill">2.5 gól felett: <b>${over25.toFixed(1)}%</b></div>
                    <div class="stat-pill">Gól-Gól (BTS): <b>${bts.toFixed(1)}%</b></div>
                </div>
            </div>
            ${matrixHtml}
        `;
        gomb.style.display = 'none';
    }
    </script>
</body>
</html>
